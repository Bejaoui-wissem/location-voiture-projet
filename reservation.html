<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réservation - AutoDrive</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Finaliser votre réservation</h4>
                    </div>
                    <div class="card-body">
                        <form>
                            <div class="mb-3">
                                <label class="form-label">Véhicule choisi</label>
                                <input type="text" class="form-control" value="Peugeot 208" readonly>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Date de début</label>
                                <input type="date" class="form-control" id="date-debut" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Date de fin</label>
                                <input type="date" class="form-control" id="date-fin" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Nom complet</label>
                                <input type="text" class="form-control" placeholder="Jean Dupont" required>
                            </div>
                            <button type="button" class="btn btn-success w-100" onclick="confirmerResa()">Confirmer et Payer</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function confirmerResa() {
            let dateDebut = document.getElementById('date-debut').value;
            let dateFin = document.getElementById('date-fin').value;
            
            if(dateDebut && dateFin) {
                alert("Félicitations ! Votre réservation du " + dateDebut + " au " + dateFin + " est confirmée.");
            } else {
                alert("Veuillez sélectionner vos dates de location.");
            }
        }
    </script>
</body>
</html>

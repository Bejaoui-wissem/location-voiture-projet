<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réservation - AutoDrive Tunisie</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #2d3436 !important; }
        .card { border-radius: 15px; border: none; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark mb-5">
      <div class="container">
        <a class="navbar-brand" href="index.html">🇹🇳 AutoDrive Tunisie</a>
        <div class="navbar-nav">
          <a class="nav-link" href="index.html">Catalogue</a>
          <a class="nav-link" href="login.html">Connexion</a>
        </div>
      </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg p-4">
                    <h2 class="text-center mb-4">Finaliser votre réservation</h2>
                    <form id="resa-form">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Modèle choisi</label>
                            <select id="voiture-select" class="form-select">
                                <option value="110">Renault Symbol (110 DT/jour)</option>
                                <option value="120">Kia Picanto (120 DT/jour)</option>
                                <option value="140">VW Polo 8 (140 DT/jour)</option>
                            </select>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Début</label>
                                <input type="date" class="form-control" id="date-debut" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Fin</label>
                                <input type="date" class="form-control" id="date-fin" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Numéro de téléphone (+216)</label>
                            <input type="text" class="form-control" placeholder="Ex: 98 123 456" required>
                        </div>
                        
                        <div class="alert alert-danger text-center shadow-sm">
                            <h4 class="mb-0">Total : <span id="prix-total">0</span> DT</h4>
                        </div>

                        <button type="button" class="btn btn-dark w-100 btn-lg" onclick="confirmer()">Confirmer la location</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        const dateDebut = document.getElementById('date-debut');
        const dateFin = document.getElementById('date-fin');
        const voitureSelect = document.getElementById('voiture-select');
        const prixTotalAffichage = document.getElementById('prix-total');

        function calculerPrix() {
            if (dateDebut.value && dateFin.value) {
                let debut = new Date(dateDebut.value);
                let fin = new Date(dateFin.value);
                let difference = fin - debut;
                let jours = difference / (1000 * 60 * 60 * 24);

                if (jours > 0) {
                    let prixJour = parseInt(voitureSelect.value);
                    prixTotalAffichage.innerText = jours * prixJour;
                } else {
                    prixTotalAffichage.innerText = "0";
                }
            }
        }

        dateDebut.addEventListener('change', calculerPrix);
        dateFin.addEventListener('change', calculerPrix);
        voitureSelect.addEventListener('change', calculerPrix);

        function confirmer() {
            if(prixTotalAffichage.innerText === "0") {
                alert("Veuillez choisir des dates valides !");
            } else {
                alert("🇹🇳 Réservation enregistrée ! Un agent d'AutoDrive vous contactera au numéro indiqué.");
            }
        }
    </script>
</body>
</html>

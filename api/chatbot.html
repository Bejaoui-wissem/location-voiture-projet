<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Assistant AutoDrive</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #2d3436 !important; }
        #chat-box { height: 450px; overflow-y: auto; background: white; border-radius: 10px; padding: 20px; border: 1px solid #dee2e6; }
        .message-user { background: #2d3436; color: white; padding: 10px 15px; border-radius: 15px 15px 0 15px; margin: 8px 0; max-width: 75%; margin-left: auto; }
        .message-bot { background: #d63031; color: white; padding: 10px 15px; border-radius: 15px 15px 15px 0; margin: 8px 0; max-width: 75%; }
        .typing { color: #888; font-style: italic; padding: 10px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark navbar-expand-lg mb-4">
        <div class="container">
            <a class="navbar-brand" href="index.html">AutoDrive Tunisie</a>
            <div class="navbar-nav">
                <a class="nav-link" href="index.html">Catalogue</a>
                <a class="nav-link" href="login.html">Connexion</a>
            </div>
        </div>
    </nav>

    <div class="container" style="max-width: 700px;">
        <div class="card shadow-sm p-4">
            <h4 class="mb-3 text-center">Assistant AutoDrive</h4>
            <div id="chat-box">
                <div class="message-bot">
                    Bonjour ! Je suis votre assistant AutoDrive. Dites-moi vos besoins et je vous recommande la voiture ideale !
                </div>
            </div>
            <div class="input-group mt-3">
                <input type="text" id="user-input" class="form-control" 
                    placeholder="Ex: je veux une voiture pas chere pour 3 jours a Tunis..." 
                    onkeypress="if(event.key==='Enter') envoyerMessage()">
                <button class="btn btn-dark" onclick="envoyerMessage()">Envoyer</button>
            </div>
        </div>
    </div>

<script>
    const voitures = [
        { marque: 'Peugeot', modele: '208', prix: 35, statut: 'disponible' },
        { marque: 'Renault', modele: 'Clio 5', prix: 40, statut: 'disponible' },
        { marque: 'Mercedes', modele: 'Classe A', prix: 80, statut: 'disponible' }
    ];

    function getReponse(message) {
        message = message.toLowerCase();

        if(message.includes('bonjour') || message.includes('salut') || message.includes('hello')) {
            return 'Bonjour ! Comment puis-je vous aider ? Dites-moi votre budget et vos dates de location !';
        }
        else if(message.includes('pas cher') || message.includes('economique') || message.includes('budget') || message.includes('moins')) {
            return 'Je vous recommande la Peugeot 208 a seulement 35 DT/jour ! Economique et parfaite pour la ville. Voulez-vous la reserver ?';
        }
        else if(message.includes('famille') || message.includes('confort') || message.includes('voyage')) {
            return 'Pour un voyage en famille, la Renault Clio 5 a 40 DT/jour est ideale ! Confortable et economique en carburant.';
        }
        else if(message.includes('luxe') || message.includes('classe') || message.includes('premium') || message.includes('mercedes')) {
            return 'Pour le luxe, rien de mieux que la Mercedes Classe A a 80 DT/jour ! Elegante et tres confortable.';
        }
        else if(message.includes('prix') || message.includes('tarif') || message.includes('cout')) {
            return 'Nos tarifs : Peugeot 208 = 35 DT/jour, Renault Clio 5 = 40 DT/jour, Mercedes Classe A = 80 DT/jour. Quel est votre budget ?';
        }
        else if(message.includes('disponible') || message.includes('libre')) {
            return 'Toutes nos voitures sont disponibles ! Peugeot 208, Renault Clio 5 et Mercedes Classe A. Laquelle vous interesse ?';
        }
        else if(message.includes('reserver') || message.includes('louer') || message.includes('reservation')) {
            return 'Pour reserver, allez sur notre catalogue et cliquez sur "Reserver maintenant" sur la voiture de votre choix !';
        }
        else if(message.includes('tunis') || message.includes('sousse') || message.includes('sfax')) {
            return 'Nous livrons dans toute la Tunisie ! Tunis, Sousse, Sfax et plus encore. Quelle voiture vous convient ?';
        }
        else if(message.includes('merci')) {
            return 'Avec plaisir ! N hesitez pas si vous avez d autres questions. Bonne location !';
        }
        else {
            return 'Je suis la pour vous aider a choisir votre voiture ideale ! Dites-moi votre budget ou vos besoins et je vous conseille.';
        }
    }

    function envoyerMessage() {
        const input = document.getElementById('user-input');
        const message = input.value.trim();
        if (!message) return;

        ajouterMessage(message, 'user');
        input.value = '';

        setTimeout(() => {
            const reponse = getReponse(message);
            ajouterMessage(reponse, 'bot');
        }, 800);
    }

    function ajouterMessage(texte, type) {
        const chatBox = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = type === 'user' ? 'message-user' : 'message-bot';
        div.textContent = texte;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>
</body>
</html>

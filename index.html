<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoDrive Tunisie - Location de Voitures</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .hero { background: #d63031; color: white; padding: 50px 0; text-align: center; margin-bottom: 40px; }
        .card-img-top { height: 200px; object-fit: cover; }
        .navbar { background-color: #2d3436 !important; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">🇹🇳 AutoDrive Tunisie</a>
        <div class="navbar-nav">
          <a class="nav-link active" href="index.html">Catalogue</a>
          <a class="nav-link" href="login.html">Connexion</a>
          <a class="nav-link" href="admin.html">Admin</a>
        </div>
      </div>
    </nav>

    <div class="hero">
        <h1>Bienvenue chez AutoDrive Tunisie</h1>
        <p>Louez votre voiture à Tunis, Sousse ou Sfax au meilleur prix !</p>
    </div>

    <div class="container">
        <div class="row" id="catalogue-voitures">
            </div>
    </div>

    <script>
        const voitures = [
            { id: 1, marque: 'Renault', modele: 'Symbol', prix: 110, image: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR6A7-m9jR_O1m1nE68T3FzK8T1KxW-0_6N0w&s' },
            { id: 2, marque: 'Kia', modele: 'Picanto', prix: 120, image: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRe_Y0E_7p7G19E8qjYv6p6nE68T3FzK8T1KxW-0_6N0w&s' },
            { id: 3, marque: 'Volkswagen', modele: 'Polo 8', prix: 140, image: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR_Y0E_7p7G19E8qjYv6p6nE68T3FzK8T1KxW-0_6N0w&s' }
        ];

        const catalogue = document.getElementById('catalogue-voitures');

        voitures.forEach(voiture => {
            catalogue.innerHTML += `
                <div class="col-md-4 mb-4">
                    <div class="card shadow-sm border-0">
                        <img src="${voiture.image}" class="card-img-top" alt="${voiture.marque}">
                        <div class="card-body text-center">
                            <h5 class="card-title text-uppercase fw-bold">${voiture.marque} ${voiture.modele}</h5>
                            <p class="card-text fs-4 text-danger fw-bold">${voiture.prix} DT / Jour</p>
                            <a href="reservation.html" class="btn btn-dark w-100">Réserver maintenant</a>
                        </div>
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>

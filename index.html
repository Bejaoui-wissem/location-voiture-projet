<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoDrive - Location de Voitures</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .hero { background: #0d6efd; color: white; padding: 50px 0; text-align: center; margin-bottom: 40px; }
        .card-img-top { height: 200px; object-fit: cover; }
    </style>
</head>
<body>

    <div class="hero">
        <h1>Bienvenue chez AutoDrive</h1>
        <p>Louez la voiture de vos rêves en un seul clic !</p>
    </div>

    <div class="container">
        <div class="row" id="catalogue-voitures">
            </div>
    </div>

    <script>
        // Simulation de notre base de données pour le moment
        const voitures = [
            { id: 1, marque: 'Peugeot', modele: '208', prix: 35, image: 'https://images.unsplash.com/photo-1549399542-7e3f8b79c341?auto=format&fit=crop&w=500&q=60' },
            { id: 2, marque: 'Renault', modele: 'Clio 5', prix: 40, image: 'https://images.unsplash.com/photo-1621007947382-34c769ce59d6?auto=format&fit=crop&w=500&q=60' },
            { id: 3, marque: 'Mercedes', modele: 'Classe A', prix: 80, image: 'https://images.unsplash.com/photo-1605559424843-9e4c228bf1c2?auto=format&fit=crop&w=500&q=60' }
        ];

        const catalogue = document.getElementById('catalogue-voitures');

        // Fonction pour afficher les voitures sur la page
        voitures.forEach(voiture => {
            catalogue.innerHTML += `
                <div class="col-md-4 mb-4">
                    <div class="card shadow-sm">
                        <img src="${voiture.image}" class="card-img-top" alt="${voiture.marque}">
                        <div class="card-body text-center">
                            <h5 class="card-title">${voiture.marque} ${voiture.modele}</h5>
                            <p class="card-text fs-4 text-primary fw-bold">${voiture.prix} € / jour</p>
                            <button class="btn btn-success w-100" onclick="reserver(${voiture.id})">Réserver maintenant</button>
                        </div>
                    </div>
                </div>
            `;
        });

        // Fonction quand on clique sur Réserver
        function reserver(id) {
            alert("Succès ! La voiture a bien été réservée. (Simulation pour le Sprint actuel)");
        }
    </script>
</body>
</html>

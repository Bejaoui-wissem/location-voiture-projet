<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoDrive Tunisie - Location de Voitures</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .hero { background: #d63031; color: white; padding: 50px 0; text-align: center; margin-bottom: 40px; }
        .card-img-top { height: 200px; object-fit: cover; }
        .navbar { background-color: #2d3436 !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">🇹🇳 AutoDrive Tunisie</a>
        <div class="navbar-nav">
          <a class="nav-link active" href="index.html">Catalogue</a>
          <a class="nav-link" href="login.html">Connexion</a>
          <a class="nav-link" href="admin.html">Admin</a>
        </div>
      </div>
    </nav>

    <div class="hero">
        <h1>Bienvenue chez AutoDrive Tunisie</h1>
        <p>Louez votre voiture à Tunis, Sousse ou Sfax au meilleur prix !</p>
    </div>

    <div class="container">
        <div class="row" id="catalogue-voitures"></div>
    </div>

    <script>
fetch('api/voitures.php')
    .then(res => res.json())
    .then(voitures => {
        const catalogue = document.getElementById('catalogue-voitures');
        voitures.forEach(voiture => {
            catalogue.innerHTML += `
                <div class="col-md-4 mb-4">
                    <div class="card shadow-sm border-0">
                        <img src="${voiture.image_url || 'https://via.placeholder.com/400x200'}" 
                             class="card-img-top" style="height:200px;object-fit:cover">
                        <div class="card-body text-center">
                            <h5 class="fw-bold text-uppercase">${voiture.marque} ${voiture.modele}</h5>
                            <p class="fs-4 text-danger fw-bold">${voiture.prix_jour} DT / Jour</p>
                            <span class="badge ${voiture.statut === 'disponible' ? 'bg-success' : 'bg-danger'} mb-2">
                                ${voiture.statut === 'disponible' ? 'Disponible' : 'Louée'}
                            </span><br>
                            <a href="reservation.html?id=${voiture.id}&prix=${voiture.prix_jour}" 
                               class="btn btn-dark w-100 mt-2">Réserver maintenant</a>
                        </div>
                    </div>
                </div>`;
        });
    });
    </script>
</body>
</html>

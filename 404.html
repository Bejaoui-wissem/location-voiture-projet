<!DOCTYPE html>
<html class="light" lang="fr">
<head>
<link rel="icon" type="image/svg+xml" href="assets/images/icons/favicon.svg"/>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Page introuvable - CharthaGo</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "primary": "#b90027", "primary-container": "#e31837",
        "secondary": "#5f5e5e", "surface": "#f9f9f9",
        "surface-container-lowest": "#ffffff",
        "surface-container-low": "#f3f3f3",
        "on-surface": "#1a1c1c",
      },
      fontFamily: { "body": ["Inter"] }
    }
  }
}
</script>
<script src="assets/js/darkmode.js"></script>
<style>
  body { font-family: 'Inter', sans-serif; }

  /* Voiture qui roule */
  @keyframes drive {
    0%   { transform: translateX(-120px); opacity: 0; }
    10%  { opacity: 1; }
    85%  { opacity: 1; }
    100% { transform: translateX(calc(100vw + 120px)); opacity: 0; }
  }
  @keyframes wheelSpin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  @keyframes roadMove {
    from { transform: translateX(0); }
    to   { transform: translateX(-200px); }
  }
  @keyframes bounce404 {
    0%,100% { transform: translateY(0); }
    50%     { transform: translateY(-12px); }
  }
  @keyframes fadeSlideUp {
    from { opacity:0; transform:translateY(20px); }
    to   { opacity:1; transform:translateY(0); }
  }
  @keyframes blink {
    0%,100% { opacity:1; }
    50%     { opacity:0.3; }
  }

  .car-wrap   { animation: drive 4s cubic-bezier(.4,0,.6,1) infinite; animation-delay: 0.5s; }
  .wheel      { animation: wheelSpin 0.4s linear infinite; transform-origin: center; }
  .road-line  { animation: roadMove 0.6s linear infinite; }
  .num-4-l    { animation: bounce404 2s ease-in-out infinite; animation-delay: 0s; }
  .num-0      { animation: bounce404 2s ease-in-out infinite; animation-delay: 0.2s; }
  .num-4-r    { animation: bounce404 2s ease-in-out infinite; animation-delay: 0.4s; }
  .fade-up-1  { animation: fadeSlideUp 0.6s ease-out 0.2s both; }
  .fade-up-2  { animation: fadeSlideUp 0.6s ease-out 0.4s both; }
  .fade-up-3  { animation: fadeSlideUp 0.6s ease-out 0.6s both; }
  .fade-up-4  { animation: fadeSlideUp 0.6s ease-out 0.8s both; }
  .blink      { animation: blink 1.5s ease-in-out infinite; }

  html.dark body { background: #0f1011; color: #e8e6e3; }
  html.dark .bg-white { background: #1c1e1f !important; }
  html.dark .text-zinc-900 { color: #e8e6e3 !important; }
  html.dark .text-zinc-500 { color: #9c9a92 !important; }
  html.dark .bg-zinc-100   { background: #232526 !important; }
  html.dark nav { background: rgba(15,16,17,0.85) !important; }
</style>
</head>
<body class="bg-surface min-h-screen flex flex-col">

<!-- Navbar -->
<nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-xl border-b border-zinc-100">
  <div class="flex justify-between items-center h-20 px-8 max-w-screen-2xl mx-auto">
    <a href="index.html" class="text-2xl font-black tracking-tighter text-zinc-900">
      Chartha<span style="color:#b90027">Go</span>
    </a>
    <div class="flex items-center gap-3">
      <button id="btn-dark" onclick="toggleDark()" title="Mode sombre" class="w-9 h-9 rounded-xl border border-zinc-200 flex items-center justify-center hover:border-primary transition-colors"></button>
      <a href="index.html" class="text-sm font-bold text-zinc-600 hover:text-primary transition-colors">Catalogue</a>
    </div>
  </div>
</nav>

<main class="flex-grow flex flex-col items-center justify-center px-6 pt-20 pb-12 overflow-hidden">

  <!-- Chiffres 404 animés -->
  <div class="flex items-center gap-4 mb-6 select-none fade-up-1">
    <span class="num-4-l text-[120px] md:text-[160px] font-black leading-none tracking-tighter" style="color:#b90027">4</span>
    <div class="num-0 relative">
      <!-- Le 0 contient la voiture -->
      <span class="text-[120px] md:text-[160px] font-black leading-none tracking-tighter text-zinc-200 dark:text-zinc-700">0</span>
    </div>
    <span class="num-4-r text-[120px] md:text-[160px] font-black leading-none tracking-tighter" style="color:#b90027">4</span>
  </div>

  <!-- Route avec voiture animée -->
  <div class="fade-up-2 w-full max-w-lg mb-10 relative" style="height:80px;">

    <!-- Route -->
    <div class="absolute bottom-0 left-0 right-0 rounded-2xl overflow-hidden" style="height:40px;background:#1a1c1c;">
      <!-- Lignes de route -->
      <div class="absolute top-1/2 -translate-y-1/2 flex gap-6 road-line" style="white-space:nowrap;">
        <div style="width:40px;height:4px;background:#f9c74f;border-radius:2px;flex-shrink:0;opacity:0.8"></div>
        <div style="width:40px;height:4px;background:#f9c74f;border-radius:2px;flex-shrink:0;opacity:0.8"></div>
        <div style="width:40px;height:4px;background:#f9c74f;border-radius:2px;flex-shrink:0;opacity:0.8"></div>
        <div style="width:40px;height:4px;background:#f9c74f;border-radius:2px;flex-shrink:0;opacity:0.8"></div>
        <div style="width:40px;height:4px;background:#f9c74f;border-radius:2px;flex-shrink:0;opacity:0.8"></div>
        <div style="width:40px;height:4px;background:#f9c74f;border-radius:2px;flex-shrink:0;opacity:0.8"></div>
        <div style="width:40px;height:4px;background:#f9c74f;border-radius:2px;flex-shrink:0;opacity:0.8"></div>
        <div style="width:40px;height:4px;background:#f9c74f;border-radius:2px;flex-shrink:0;opacity:0.8"></div>
      </div>
    </div>

    <!-- Voiture SVG animée -->
    <div class="car-wrap absolute" style="bottom:8px;left:0;">
      <svg width="90" height="40" viewBox="0 0 90 40" fill="none">
        <!-- Carrosserie -->
        <rect x="8" y="16" width="74" height="18" rx="4" fill="#b90027"/>
        <!-- Toit -->
        <path d="M22 16 L30 6 L60 6 L68 16 Z" fill="#e31837"/>
        <!-- Vitres -->
        <path d="M31 15 L36 7 L52 7 L57 15 Z" fill="#bfdbfe" opacity="0.8"/>
        <!-- Phares avant -->
        <ellipse cx="78" cy="24" rx="5" ry="3" fill="#fef3c7"/>
        <ellipse cx="78" cy="24" rx="3" ry="2" fill="#fde68a"/>
        <!-- Feux arrière -->
        <ellipse cx="12" cy="24" rx="4" ry="2.5" fill="#fca5a5"/>
        <!-- Roue gauche -->
        <circle cx="25" cy="34" r="6" fill="#1a1c1c"/>
        <circle class="wheel" cx="25" cy="34" r="3.5" fill="#374151"/>
        <circle cx="25" cy="34" r="1.5" fill="#9ca3af"/>
        <!-- Roue droite -->
        <circle cx="65" cy="34" r="6" fill="#1a1c1c"/>
        <circle class="wheel" cx="65" cy="34" r="3.5" fill="#374151"/>
        <circle cx="65" cy="34" r="1.5" fill="#9ca3af"/>
        <!-- Échappement -->
        <rect x="2" y="24" width="8" height="3" rx="1.5" fill="#6b7280" opacity="0.5"/>
      </svg>
    </div>
  </div>

  <!-- Message -->
  <div class="text-center max-w-md fade-up-3">
    <h1 class="text-2xl font-bold text-zinc-900 mb-3">Page introuvable</h1>
    <p class="text-zinc-500 leading-relaxed mb-8">
      Oups ! Cette route ne mène nulle part. La page que vous cherchez a peut-être été déplacée ou n'existe plus.
    </p>

    <!-- Boutons -->
    <div class="flex flex-col sm:flex-row gap-3 justify-center">
      <a href="index.html"
        class="flex items-center justify-center gap-2 px-8 py-3.5 rounded-xl font-bold text-white text-sm"
        style="background:linear-gradient(135deg,#b90027,#e31837);box-shadow:0 8px 24px rgba(185,0,39,0.3)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        Retour au catalogue
      </a>
      <button onclick="history.back()"
        class="flex items-center justify-center gap-2 px-8 py-3.5 rounded-xl font-bold text-zinc-600 text-sm bg-zinc-100 hover:bg-zinc-200 transition-colors">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        Page précédente
      </button>
    </div>
  </div>

  <!-- Liens rapides -->
  <div class="fade-up-4 mt-12 flex flex-wrap gap-3 justify-center">
    <a href="index.html"   class="text-xs font-semibold text-zinc-400 hover:text-primary transition-colors px-4 py-2 rounded-full border border-zinc-200 hover:border-primary">Catalogue</a>
    <a href="login.html"   class="text-xs font-semibold text-zinc-400 hover:text-primary transition-colors px-4 py-2 rounded-full border border-zinc-200 hover:border-primary">Connexion</a>
    <a href="chatbot.html" class="text-xs font-semibold text-zinc-400 hover:text-primary transition-colors px-4 py-2 rounded-full border border-zinc-200 hover:border-primary blink">Assistant IA</a>
  </div>

</main>

<!-- Footer minimal -->
<footer class="py-6 text-center">
  <p class="text-xs text-zinc-400">© 2026 CharthaGo · <a href="index.html" class="hover:text-primary transition-colors">Retour à l'accueil</a></p>
</footer>

</body>
</html>

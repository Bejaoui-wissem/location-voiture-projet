<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <rect width="400" height="240" fill="#f3f4f6"/>
  <!-- Carrosserie principale -->
  <rect x="60" y="120" width="280" height="70" rx="10" fill="#d1d5db"/>
  <!-- Toit -->
  <path d="M110 120 L150 75 L250 75 L290 120 Z" fill="#e5e7eb"/>
  <!-- Roue gauche -->
  <circle cx="130" cy="190" r="28" fill="#9ca3af"/>
  <circle cx="130" cy="190" r="16" fill="#f3f4f6"/>
  <circle cx="130" cy="190" r="6"  fill="#6b7280"/>
  <!-- Roue droite -->
  <circle cx="270" cy="190" r="28" fill="#9ca3af"/>
  <circle cx="270" cy="190" r="16" fill="#f3f4f6"/>
  <circle cx="270" cy="190" r="6"  fill="#6b7280"/>
  <!-- Vitre gauche -->
  <path d="M118 118 L148 82 L190 82 L190 118 Z" fill="#bfdbfe" opacity="0.7"/>
  <!-- Vitre droite -->
  <path d="M210 82 L252 82 L282 118 L210 118 Z" fill="#bfdbfe" opacity="0.7"/>
  <!-- Montant central -->
  <rect x="197" y="82" width="6" height="36" fill="#9ca3af"/>
  <!-- Phare avant -->
  <ellipse cx="330" cy="145" rx="14" ry="8" fill="#fef3c7" stroke="#e5e7eb" stroke-width="1.5"/>
  <!-- Phare arrière -->
  <ellipse cx="70" cy="145" rx="12" ry="7" fill="#fecaca" stroke="#e5e7eb" stroke-width="1.5"/>
  <!-- Texte -->
  <text x="200" y="222" font-family="Inter,sans-serif" font-size="11" font-weight="600"
    fill="#9ca3af" text-anchor="middle">AutoDrive Tunisie</text>
</svg>
